# SessionCast CI/CD Pipeline
# Inspired by "Accelerate CI/CD with Coding Agents" — Google Cloud Next '26
#
# Flow: push to main → Cloud Build (build image) → Cloud Run (deploy) → Firebase Hosting (PWA)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: almeisan-adk-sandbox
  GCP_REGION: asia-northeast1
  AGENTS_IMAGE: asia-northeast1-docker.pkg.dev/almeisan-adk-sandbox/sessioncast/agents

jobs:
  # --- Job 1: Build & Type Check (every PR and push) -------------------------
  build-test:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/pwa/package-lock.json

      - name: Install PWA dependencies
        working-directory: apps/pwa
        run: npm ci

      - name: TypeScript check
        working-directory: apps/pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: apps/pwa
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: almeisan-adk-sandbox.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: almeisan-adk-sandbox
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: almeisan-adk-sandbox.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "878394613588"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          NEXT_PUBLIC_GCP_PROJECT: almeisan-adk-sandbox
        run: npm run build

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-out
          path: apps/pwa/out/
          retention-days: 1

  # --- Job 2: Deploy to GCP (main branch push only) -------------------------
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Build & push agents image via Cloud Build
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud builds submit apps/agents/ \
            --tag="${AGENTS_IMAGE}:${COMMIT_SHA}" \
            --tag="${AGENTS_IMAGE}:latest" \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}"

      - name: Deploy agents to Cloud Run
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud run deploy sessioncast-agents \
            --image="${AGENTS_IMAGE}:${COMMIT_SHA}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --set-env-vars="GCP_PROJECT=${GCP_PROJECT}" \
            --quiet

      - name: Download PWA artifact
        uses: actions/download-artifact@v4
        with:
          name: pwa-out
          path: apps/pwa/out/

      - name: Deploy PWA to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.GCP_PROJECT }}
          channelId: live
