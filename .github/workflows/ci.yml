# SessionCast CI/CD Pipeline
# Inspired by "Accelerate CI/CD with Coding Agents" — Google Cloud Next '26
#
# Flow: push to main → Cloud Build (build image) → Cloud Run (deploy) → Firebase Hosting (PWA)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AGENTS_IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/sessioncast/agents

jobs:
  # --- Job 1: Build & Type Check (every PR and push) -------------------------
  build-test:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/pwa/package-lock.json

      - name: Install PWA dependencies
        working-directory: apps/pwa
        run: npm ci

      - name: TypeScript check
        working-directory: apps/pwa
        run: npx tsc --noEmit

      - name: Build PWA
        working-directory: apps/pwa
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.GCP_PROJECT }}.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.GCP_PROJECT }}.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          NEXT_PUBLIC_GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: npm run build

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-out
          path: apps/pwa/out/
          retention-days: 1

  # --- Job 2: Deploy to GCP (main branch push only) -------------------------
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Build & push agents image via Cloud Build
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Submit async with SHA tag (--tag only accepts one value in simple build mode)
          BUILD_ID=$(gcloud builds submit apps/agents/ \
            --tag="${AGENTS_IMAGE}:${COMMIT_SHA}" \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --async \
            --format='value(id)')
          echo "Build ID: ${BUILD_ID}"

          # Poll until complete
          while true; do
            STATUS=$(gcloud builds describe "${BUILD_ID}" \
              --region="${GCP_REGION}" \
              --project="${GCP_PROJECT}" \
              --format='value(status)')
            echo "Status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS) echo "Build succeeded."; break ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed: ${STATUS}"
                exit 1 ;;
            esac
            sleep 15
          done

          # Re-tag as latest after successful build
          gcloud artifacts docker tags add \
            "${AGENTS_IMAGE}:${COMMIT_SHA}" \
            "${AGENTS_IMAGE}:latest" \
            --project="${GCP_PROJECT}"

      - name: Deploy agents to Cloud Run
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          gcloud run deploy sessioncast-agents \
            --image="${AGENTS_IMAGE}:${COMMIT_SHA}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --set-env-vars="GCP_PROJECT=${GCP_PROJECT}" \
            --quiet

      - name: Download PWA artifact
        uses: actions/download-artifact@v4
        with:
          name: pwa-out
          path: apps/pwa/out/

      - name: Deploy PWA to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.GCP_PROJECT }}
          channelId: live
